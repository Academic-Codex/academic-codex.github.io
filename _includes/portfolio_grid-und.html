<!-- Portfolio Grid Section -->
<section id="portfolio-und">
  <div class="container portfolio-flex-grid">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Undergrad</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="portfolio-flex-row">
      {% assign grad_posts = site.posts | where: "category", "undergrad" %}
      {% for post in grad_posts %}
      <div class="portfolio-flex-item portfolio-item">
        <div class="card-title text-center">{{ post.title }}</div>
        {% if post.link %}
        <a href="{{ post.link | relative_url }}" class="portfolio-link" target="_blank" rel="noopener">
          {% else %}
          <a href="#portfolioModal-{{ post.modal-id }}" class="portfolio-link" data-toggle="modal">
            {% endif %}
            <div class="thumb">
              <img src="img/portfolio/{{ post.img }}" alt="{{ post.alt | default: post.title }}">
              <div class="caption" aria-hidden="true">
                <div class="caption-content"><i class="fa-solid fa-bolt fa-3x"></i></div>
              </div>
            </div>
          </a>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
