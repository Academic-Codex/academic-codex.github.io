# .github/workflows/build-template-site.yml (reutilizável)
name: Build Template Site (reusable)

on:
  workflow_call:
    inputs:
      site_title:
        description: "Título do site"
        type: string
        required: false
        default: ""
      execute:
        description: "Executar notebooks antes de converter (true/false)"
        type: string
        required: false
        default: "false"
      template_repo:
        description: "Repo do template (org/repo)"
        type: string
        required: false
        default: "Academic-Codex/academic-codex.github.io"
      template_path:
        description: "Caminho do template dentro do repo central"
        type: string
        required: false
        default: ".github/template"
    secrets:
      GH_TOKEN:
        required: false  # use secrets: inherit se preferir

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout disciplina
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install nbconvert deps
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert jinja2 nbformat pyyaml

      - name: Fetch hero image
        shell: bash
        run: |
          set -euo pipefail

          BASE_RAW="https://raw.githubusercontent.com/${{ inputs.template_repo }}/main"

          python - <<'PY' > hero_relpath.txt
          import yaml, sys
          from pathlib import Path
          d = {}
          p = Path(".scripts/codex.yml")
          if p.exists():
              d = yaml.safe_load(p.read_text(encoding="utf-8")) or {}
          sub = (d.get("ASSETS_SUBDIR") or "img/portfolio").strip("/")
          fil = (d.get("HERO_FILE") or "").strip("/")
          if not fil:
              sys.exit("HERO_FILE ausente em .scripts/codex.yml")
          print(f"{sub}/{fil}")
          PY

          HERO_REL=$(cat hero_relpath.txt)
          HERO_URL="$BASE_RAW/$HERO_REL"

          echo "Baixando hero: $HERO_URL"

          # Copia o template do repositório central
          rm -rf template
          rsync -a "central/${{ inputs.template_path }}/" template/

          # Cria a pasta e baixa o hero (PNG fixo)
          mkdir -p template/assets
          curl -fsSL "$HERO_URL" -o template/assets/hero.png

          # Atualiza o placeholder do index.html
          sed -i.bak 's#{{ *HERO_URL *}}#./assets/hero.png#g' template/index.html

      - name: Build static site
        run: |
          python .github/scripts/build_site.py \
            --src . \
            --out site \
            --template template \
            --title "${{ inputs.site_title }}" \
            --cfg .scripts/codex.yml \
            --execute ${{ inputs.execute }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site