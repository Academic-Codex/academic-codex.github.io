name: Build & Deploy repos Site

env:
  SITE_TEMPLATE_PATH: ".github/templates/site"

on:
  workflow_call:
    inputs:
      site_title:
        type: string
        required: false
        default: ""
      execute:
        type: string
        required: false
        default: "false"
      template_repo:
        type: string
        required: false
        default: "Academic-Codex/academic-codex.github.io"
      template_ref:
        type: string
        required: false
        default: "main"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout do repositório da disciplina (consumidor)
      - name: Checkout discipline repo
        uses: actions/checkout@v4

      # 2) Checkout do repositório central (template e scripts + registry)
      - name: Checkout central (template e scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.template_repo }}
          ref: ${{ inputs.template_ref }}
          path: central
          sparse-checkout: |
            .github/templates
            .github/scripts/build_site.py
            .github/registry
          sparse-checkout-cone-mode: false

      # 3) Verifica se o template existe
      - name: Validate template path
        run: |
          set -euo pipefail
          TEMPLATE_DIR="central/${{ env.SITE_TEMPLATE_PATH }}"
          echo "TEMPLATE_DIR=$TEMPLATE_DIR"
          test -f "$TEMPLATE_DIR/index.html" || { echo "index.html não encontrado em $TEMPLATE_DIR"; ls -laR central; exit 1; }

      # 4) Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert jinja2 nbformat pyyaml

      # 5) Copia o template do central para ./template/
      - name: Copy template from central
        run: |
          set -euo pipefail
          rm -rf template
          rsync -a --delete "central/${{ env.SITE_TEMPLATE_PATH }}/" "template/"

      # 6) Resolve config do repo (TITLE, HERO_FILE, etc.) a partir do registry central
      - name: Resolve config from central registry
        shell: bash
        run: |
          set -euo pipefail

          FULL="${GITHUB_REPOSITORY}"   # ex: academic-codex/SEL0608-Eletromagnetismo
          OWNER="${FULL%%/*}"
          REPO="${FULL##*/}"

          echo "OWNER=$OWNER" >> "$GITHUB_ENV"
          echo "REPO=$REPO"   >> "$GITHUB_ENV"

          python - <<'PY'
          import yaml, sys
          from pathlib import Path

          owner = "${OWNER}"
          repo  = "${REPO}"

          reg = Path("central/.github/registry/repos.yml")
          if not reg.exists():
            print(f"[fatal] registry not found: {reg}", file=sys.stderr)
            sys.exit(2)

          data = yaml.safe_load(reg.read_text(encoding="utf-8")) or {}
          items = data.get("repos", [])

          hit = None
          for it in items:
            if (it.get("org") == owner) and (it.get("name") == repo):
              hit = it
              break

          if not hit:
            print(f"[fatal] repo {owner}/{repo} not found in central registry: {reg}", file=sys.stderr)
            sys.exit(2)

          site = hit.get("site") or {}

          out = {
            # tokens básicos
            "TITLE": hit.get("title") or repo,

            # hero (se vazio, o workflow só pula)
            "HERO_FILE": site.get("hero_image", ""),

            # se você guardar heros em outra pasta no template central, ajuste aqui:
            # ex: ".github/templates/site/assets/img/hero/<arquivo>"
            "ASSETS_SUBDIR": (site.get("hero_subdir") or ".github/templates/site/assets/img/hero").strip("/"),
          }

          Path("_cfg").mkdir(exist_ok=True)
          Path("_cfg/site.yml").write_text(
            yaml.safe_dump(out, sort_keys=False, allow_unicode=True),
            encoding="utf-8"
          )
          print("[ok] wrote _cfg/site.yml")
          PY

      # 7) Baixa HERO_FILE do repositório central e injeta no template (opcional)
      - name: Fetch hero image
        shell: bash
        run: |
          set -euo pipefail

          BASE_RAW="https://raw.githubusercontent.com/${{ inputs.template_repo }}/${{ inputs.template_ref }}"

          python - <<'PY' > hero_relpath.txt
          import sys, yaml
          from pathlib import Path

          data = {}
          cfg_path = Path("_cfg")

          def merge(d):
            if not d: return
            for k,v in d.items():
              data[k] = v

          if cfg_path.exists():
            for p in sorted(list(cfg_path.rglob("*.yml")) + list(cfg_path.rglob("*.yaml"))):
              merge(yaml.safe_load(p.read_text(encoding="utf-8")) or {})

          sub = (data.get("ASSETS_SUBDIR") or "").strip("/")
          fil = (data.get("HERO_FILE") or "").strip("/")

          if not fil:
            print("")
            sys.exit(0)

          print(f"{sub}/{fil}" if sub else fil)
          PY

          HERO_REL="$(cat hero_relpath.txt || true)"
          if [ -z "$HERO_REL" ]; then
            echo "Sem HERO_FILE → pulando download da hero."
            exit 0
          fi

          HERO_URL="$BASE_RAW/$HERO_REL"
          echo "Baixando hero: $HERO_URL"

          mkdir -p template/assets/img
          curl -fsSL "$HERO_URL" -o template/assets/img/hero.png

          # Substitui token HERO_URL em todas as páginas do template (se existir)
          find template -maxdepth 1 -name "*.html" -print0 | xargs -0 sed -i.bak 's#{{ *HERO_URL *}}#./assets/img/hero.png#g'

      # 8) Constrói o site (usa o script do central)
      - name: Build site
        run: |
          python central/.github/scripts/build_site.py \
            --src . \
            --out site \
            --template template \
            --title "${{ inputs.site_title }}" \
            --cfg "_cfg" \
            --execute ${{ inputs.execute }}

      # 9) Diagnóstico opcional
      - name: Show site tree
        run: |
          echo "== Conteúdo da pasta site =="
          ls -lah site || true
          echo "== Estrutura de arquivos =="
          find site -maxdepth 3 -type f | sort

      # 10) Deploy para a branch gh-pages
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true