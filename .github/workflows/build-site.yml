# .github/workflows/build-template-site.yml
name: Build & Deploy Template Site

env:
  SITE_TEMPLATE_PATH: ".github/templates/site"

on:
  workflow_call:
    inputs:
      site_title:
        type: string
        required: false
        default: ''
      execute:
        type: string
        required: false
        default: "false"
      template_repo:
        type: string
        required: false
        default: "Academic-Codex/academic-codex.github.io" # default em uso!
      template_ref:
        type: string
        required: false
        default: "main" # default em uso!
      placeholders_path:
        type: string
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout do repositório da disciplina (consumidor)
      - name: Checkout discipline repo
        uses: actions/checkout@v4

      # 2) Checkout do repositório central (template e scripts)
      - name: Checkout central (template e scripts)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.template_repo }}
          ref: ${{ inputs.template_ref }}
          path: central
          sparse-checkout: |
            .github/templates
            .github/scripts/build_site.py
          sparse-checkout-cone-mode: false

      # 3) Verifica se o template existe
      - name: Validate template path
        run: |
          set -euo pipefail
          TEMPLATE_DIR="central/${{ env.SITE_TEMPLATE_PATH }}"
          echo "TEMPLATE_DIR=$TEMPLATE_DIR"
          test -f "$TEMPLATE_DIR/index.html" || { echo "index.html não encontrado em $TEMPLATE_DIR"; ls -laR central; exit 1; }

      # 4) Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert jinja2 nbformat pyyaml

      # 5) Copia o template do central para ./template/
      - name: Copy template from central
        run: |
          set -euo pipefail
          rm -rf template
          rsync -a --delete "central/${{ env.SITE_TEMPLATE_PATH }}/" "template/"

      # 6) Monta URL base e baixa HERO_FILE do repositório da disciplina
      - name: Fetch hero image
        shell: bash
        run: |
          set -euo pipefail

          # mesma base que você já usa
          BASE_RAW="https://raw.githubusercontent.com/${{ inputs.template_repo }}/${{ inputs.template_ref }}"

          # lê um ARQUIVO ou um DIRETÓRIO e mescla todos yml/yaml
          python - <<'PY' > hero_relpath.txt
          import sys, yaml
          from pathlib import Path

          cfg_path = Path("${{ inputs.repo_cfg_path }}")  # pode ser arquivo OU diretório
          data = {}

          def merge(d):
            if not d: return
            for k,v in d.items():
              data[k] = v

          if cfg_path.exists():
            if cfg_path.is_file():
              merge(yaml.safe_load(cfg_path.read_text(encoding="utf-8")) or {})
            else:
              for p in sorted(list(cfg_path.rglob("*.yml")) + list(cfg_path.rglob("*.yaml"))):
                merge(yaml.safe_load(p.read_text(encoding="utf-8")) or {})

          sub = (data.get("ASSETS_SUBDIR") or "img/portfolio").strip("/")
          fil = (data.get("HERO_FILE") or "").strip("/")

          # não mata o build se não tiver hero (só pula)
          if not fil:
            print("")
            sys.exit(0)

          print(f"{sub}/{fil}")
          PY

          HERO_REL="$(cat hero_relpath.txt || true)"
          if [ -z "$HERO_REL" ]; then
            echo "Sem HERO_FILE → pulando download da hero."
            exit 0
          fi

          HERO_URL="$BASE_RAW/$HERO_REL"
          echo "Baixando hero: $HERO_URL"

          mkdir -p template/assets/img
          curl -fsSL "$HERO_URL" -o template/assets/img/hero.png

          sed -i.bak 's#{{ *HERO_URL *}}#./assets/img/hero.png#g' template/index.html


      # 7) Constrói o site (usa o script do central)
      - name: Build site
        run: |
          python central/.github/scripts/build_site.py \
            --src . \
            --out site \
            --template template \
            --title "${{ inputs.site_title }}" \
            --cfg "${{ inputs.placeholders_path }}" \
            --execute ${{ inputs.execute }}

      # 8) Diagnóstico opcional
      - name: Show site tree
        run: |
          echo "== Conteúdo da pasta site =="
          ls -lah site || true
          echo "== Estrutura de arquivos =="
          find site -maxdepth 3 -type f | sort

      # 9) Upload do artefato (GitHub Pages)
      - name: Upload artifact (site/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # 10) Deploy para a branch gh-pages
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true