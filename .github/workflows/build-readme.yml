name: Build README (Reusable)

env:
  README_TEMPLATE_PATH: ".github/templates/readme"

on:
  workflow_call:
    inputs:
      template_repo:
        type: string
        required: false
        default: "Academic-Codex/academic-codex.github.io"
      repo_cfg_path:
        type: string
        required: true
      template_ref:
        type: string
        required: false
        default: "v1" # default em uso!

permissions:
  contents: write

concurrency:
  group: readme-${{ github.repository }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Checkout central templates
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.template_repo }}
          ref: ${{ inputs.template_ref }}
          path: central
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml

      - name: Build README + SVGs
        run: |
          python central/.github/scripts/build_readme.py \
            --repo . \
            --central "central/${{ env.README_TEMPLATE_PATH }}" \
            --repo-cfg "${{ inputs.repo_cfg_path }}"

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .github/readme || true
          git commit -m "chore(readme): auto-generate README + banners"
          git push