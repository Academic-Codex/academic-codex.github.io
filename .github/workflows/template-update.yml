name: Notify disciplines on template change

env:
  GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

on:
  push:
    branches: [ main ]
    paths:
      - '.github/template/**'   
  # (opcional) se quiser cobrir merges de PRs também:
  pull_request:
    types: [closed]
    branches: [ main ]
    paths:
      - '.github/template/**' 

jobs:
  notify:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Disparar rebuild nas disciplinas
        run: |
          repos=(
            "Academic-Codex/SAP0679-Humanidades-e-Ciencias-Sociais"
          )
          for repo in "${repos[@]}"; do
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$repo/dispatches \
              -d '{"event_type":"template-updated"}'
          done