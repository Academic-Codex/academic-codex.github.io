<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#0b1220" />
            <stop offset="100%" stop-color="#111827" />
        </linearGradient>
    </defs>

    <!-- Card -->
    <rect width="1200" height="260" rx="18" fill="url(#g)" />

    <!-- Title -->
    <text x="50%" y="105"
        text-anchor="middle"
        font-size="42"
        font-family="Inter, Arial, sans-serif"
        font-weight="600">
        <tspan fill="#e5e7eb">
            {{TITLE_1}} — {{TITLE_2}}
        </tspan>
    </text>

    <!-- Description -->
    <text x="50%" y="145"
        text-anchor="middle"
        font-size="18"
        font-family="Inter, Arial, sans-serif">
        <tspan fill="#9ca3af">
            {{REPO_TAGLINE}}
        </tspan>
    </text>

    <!-- CTA -->
    <text x="50%" y="185"
        text-anchor="middle"
        font-size="18"
        font-family="Inter, Arial, sans-serif"
        font-weight="500">
        <tspan fill="#93c5fd">
            → {{CTA_TEXT}}
        </tspan>
    </text>
</svg>