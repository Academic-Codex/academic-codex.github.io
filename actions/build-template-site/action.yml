name: "Build and Publish Academic Codex Site"
description: "Converte notebooks e publica o site usando o template global"
author: "Chanah Yocheved Bat Sarah"
inputs:
  notebooks_path:
    description: "Diretório com os Jupyter Notebooks"
    default: "notebooks"
  output_branch:
    description: "Branch onde será publicado o site"
    default: "gh-pages"

runs:
  using: "composite"
  steps:
    - name: Checkout repositório da disciplina
      uses: actions/checkout@v4

    - name: Checkout template global
      uses: actions/checkout@v4
      with:
        repository: academic-codex/github.io
        path: template-global
        sparse-checkout: ".github/actions/build-template-site/template"

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Instalar dependências
      run: pip install jupyter nbconvert
      shell: bash

    - name: Converter notebooks para HTML
      run: |
        mkdir -p site
        python template-global/.github/actions/build-template-site/scripts/convert_notebooks.py \
          --input ${{ inputs.notebooks_path }} --output site/
      shell: bash

    - name: Copiar template global
      run: cp -r template-global/.github/actions/build-template-site/template/* site/
      shell: bash

    - name: Publicar no GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: ${{ inputs.output_branch }}
        publish_dir: ./site